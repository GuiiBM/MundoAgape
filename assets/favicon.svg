<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #047ab8; }
        .text { fill: #ffffff; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #047ab8; }
        .text { fill: #ffffff; }
      }
    </style>
  </defs>
  <rect class="bg" width="100" height="100" rx="20"/>
  <text x="50" y="70" font-size="60" font-weight="bold" text-anchor="middle" class="text" font-family="Arial, sans-serif">✨</text>
</svg>
